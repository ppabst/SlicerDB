# Slicekeeper — End-user Compose example.
# Pulls the pre-built image from GitHub Container Registry, no local build needed.
#
# Usage:
#   curl -fsSLO https://raw.githubusercontent.com/ppabst/SlicerDB/main/docker-compose.example.yml
#   docker compose -f docker-compose.example.yml up -d
#
# UI:    http://<your-host>:8080
# Data:  ./data/  (mount; SQLite + uploaded slicer files)

services:
  slicekeeper:
    image: ghcr.io/ppabst/slicerdb:1.0.0
    container_name: slicekeeper
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      SLICERDB_DATA_DIR: /data
      SLICERDB_BIND_HOST: 0.0.0.0
      SLICERDB_BIND_PORT: "8080"

      # Optional: pre-fill the Spoolman integration on first start. After
      # that, configure via the GUI (Einstellungen) — DB takes precedence.
      # SLICERDB_SPOOLMAN_URL: "http://<your-host>:7912"
      # SLICERDB_SPOOLMAN_PUBLIC_URL: "http://<your-host>:7912"
      # SLICERDB_SPOOLMAN_AUTO_SYNC: "true"
      # SLICERDB_SPOOLMAN_SYNC_INTERVAL_SECONDS: "21600"

# Tip: when Spoolman runs on the same Docker host (LXC-typical setup), use
# `network_mode: host` and point SPOOLMAN_URL at http://localhost:7912.
# Drop the `ports:` block in that case — host networking exposes 8080 directly.
