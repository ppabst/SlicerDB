services:
  slicerdb:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: slicerdb:dev
    container_name: slicerdb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../data:/data
    environment:
      SLICERDB_DATA_DIR: /data
      SLICERDB_BIND_HOST: 0.0.0.0
      SLICERDB_BIND_PORT: "8080"
      # SLICERDB_SPOOLMAN_URL: "http://<your-host>:7912"
