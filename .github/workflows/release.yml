name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag/version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          # Single-arch (amd64) for 1.0; arm64 to follow once there's demand.
          platforms: linux/amd64
          tags: |
            ghcr.io/ppabst/slicerdb:${{ steps.meta.outputs.version }}
            ghcr.io/ppabst/slicerdb:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Slicekeeper ${{ steps.meta.outputs.tag }}

            Pull the image:
            ```
            docker pull ghcr.io/ppabst/slicerdb:${{ steps.meta.outputs.version }}
            ```

            Or use the [end-user Compose example](https://raw.githubusercontent.com/ppabst/SlicerDB/main/docker-compose.example.yml).

            See [CHANGELOG.md](https://github.com/ppabst/SlicerDB/blob/main/CHANGELOG.md) for what's new.
            ---
