name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Pre-create static asset stubs
        # Tests load templates that reference output.css and htmx.min.js;
        # make the files exist so url_for() doesn't 404 in the test client.
        run: |
          mkdir -p app/static/css app/static/js
          touch app/static/css/output.css app/static/js/htmx.min.js

      - name: Pytest
        run: uv run pytest -v

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: slicekeeper:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
