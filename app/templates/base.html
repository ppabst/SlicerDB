<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SlicerDB{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/output.css') }}">
    <script src="{{ url_for('static', path='js/htmx.min.js') }}" defer></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <header class="border-b border-slate-200 bg-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
            <a href="/" class="flex items-center gap-2 text-lg font-semibold tracking-tight">
                <span class="inline-block h-2 w-2 rounded-full bg-emerald-500"></span>
                SlicerDB
            </a>
            <nav class="flex items-center gap-6 text-sm text-slate-600">
                <a href="/" class="hover:text-slate-900">Übersicht</a>
                <a href="/healthz" class="hover:text-slate-900">Status</a>
                <span class="text-slate-400">v{{ version }}</span>
            </nav>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 border-t border-slate-200 py-6 text-center text-xs text-slate-500">
        SlicerDB · GPL-3.0 · self-hosted
    </footer>
</body>
</html>
