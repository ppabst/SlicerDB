<tr id="slicer-{{ s.id }}">
    <td class="px-4 py-2.5 font-medium text-slate-900">
        <button type="button"
                class="text-left hover:text-emerald-700"
                hx-get="/slicers/{{ s.id }}/edit"
                hx-target="#slicer-{{ s.id }}"
                hx-swap="outerHTML">{{ s.name }}</button>
    </td>
    <td class="px-4 py-2.5 text-slate-600">{{ s.version or '—' }}</td>
    <td class="px-4 py-2.5">
        <span class="inline-flex items-center rounded bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-700">{{ s.profile_format }}</span>
    </td>
    <td class="px-4 py-2.5 text-right">
        <div class="flex items-center justify-end gap-1.5">
            <button type="button"
                    hx-get="/slicers/{{ s.id }}/edit"
                    hx-target="#slicer-{{ s.id }}"
                    hx-swap="outerHTML"
                    class="inline-flex items-center rounded border border-slate-200 px-2.5 py-1 text-xs font-medium text-slate-700 hover:bg-slate-50">Bearbeiten</button>
            <button type="button"
                    hx-delete="/slicers/{{ s.id }}"
                    hx-target="#slicer-list"
                    hx-swap="innerHTML"
                    hx-confirm="Slicer „{{ s.name }}" wirklich löschen?"
                    class="inline-flex items-center rounded border border-rose-200 px-2.5 py-1 text-xs font-medium text-rose-700 hover:bg-rose-50">Löschen</button>
        </div>
    </td>
</tr>
